name: Manual CD Workflow - Partial Deploy

on:
  workflow_dispatch:
    inputs:
      bundle_folders:
        description: "Comma separated bundle folders to deploy (e.g., src,test)"
        required: true
        default: ""

run-name: Manual CD Deployment with Partial Bundle Deploy

jobs:
  cd-deploy-stage:
    name: Deploy to Stage
    runs-on: ubuntu-latest
    environment: stage

    steps:
      # 1️⃣ Checkout code
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      # 2️⃣ Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3️⃣ Install Databricks CLI
      - name: Install Databricks CLI
        run: curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh

      # 4️⃣ Install Python dependencies
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install setuptools wheel

      # 5️⃣ Configure Databricks
      - name: Configure Databricks
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: databricks current-user me

      # 6️⃣ Deploy selected folders to stage
      - name: Deploy selected bundles to Stage
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          FOLDERS="${{ github.event.inputs.bundle_folders }}"
          if [ -z "$FOLDERS" ]; then
            echo "No folders specified. Exiting."
            exit 1
          fi

          IFS=',' read -ra DIRS <<< "$FOLDERS"

          for DIR in "${DIRS[@]}"; do
            echo "Deploying folder '$DIR' to stage only (partial bundle deploy)"
            databricks bundle validate --target stage --path "$DIR"
            databricks bundle deploy --target stage --path "$DIR" 
          done

  cd-deploy-prod:
    name: Deploy to Prod
    needs: cd-deploy-stage
    runs-on: ubuntu-latest
    environment: prod

    steps:
      # 1️⃣ Checkout code
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      # 2️⃣ Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3️⃣ Install Databricks CLI
      - name: Install Databricks CLI
        run: curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh

      # 4️⃣ Install Python dependencies
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install setuptools wheel

      # 5️⃣ Configure Databricks
      - name: Configure Databricks
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: databricks current-user me

      # 6️⃣ Deploy selected folders to prod
      - name: Deploy selected bundles to Prod
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          FOLDERS="${{ github.event.inputs.bundle_folders }}"
          if [ -z "$FOLDERS" ]; then
            echo "No folders specified. Exiting."
            exit 1
          fi

          IFS=',' read -ra DIRS <<< "$FOLDERS"

          for DIR in "${DIRS[@]}"; do
            echo "Deploying folder '$DIR' to prod only (partial bundle deploy)"
            databricks bundle validate --target prod --path "$DIR"
            databricks bundle deploy --target prod --path "$DIR" 
          done
