name: CD Workflow Param

on:
  workflow_dispatch:
    inputs:
      bundle_folders:
        description: "Comma separated bundle folders to deploy"
        required: false
        default: "."

run-name: Deploy release ${{ github.event.release.tag_name || 'manual' }}

jobs:
  cd-deploy-stage:
    name: Deploy to stage
    runs-on: ubuntu-latest
    environment: stage

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || github.ref }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Databricks CLI
        run: curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install setuptools wheel

      - name: Configure Databricks (PAT)
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: databricks current-user me

      - name: Set bundle folder
        run: |
          if [ -z "${{ inputs.bundle_folder }}" ]; then
            echo "BUNDLE_PATH=." >> $GITHUB_ENV
          else
            echo "BUNDLE_PATH=bundles/${{ inputs.bundle_folder }}" >> $GITHUB_ENV
          fi

      - name: Validate bundle (stage)
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          cd $BUNDLE_PATH
          databricks bundle validate --target stage

      - name: Deploy bundle (stage)
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          cd $BUNDLE_PATH
          databricks bundle deploy --target stage

  cd-deploy-prod:
    name: Deploy to prod
    needs: cd-deploy-stage
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || github.ref }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Databricks CLI
        run: curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install setuptools wheel

      - name: Configure Databricks (PAT)
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: databricks current-user me

      - name: Set bundle folder
        run: |
          if [ -z "${{ inputs.bundle_folder }}" ]; then
            echo "BUNDLE_PATH=." >> $GITHUB_ENV
          else
            echo "BUNDLE_PATH=bundles/${{ inputs.bundle_folder }}" >> $GITHUB_ENV
          fi

      - name: Validate bundle (prod)
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          cd $BUNDLE_PATH
          databricks bundle validate --target prod

      - name: Deploy bundle (prod)
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          cd $BUNDLE_PATH
          databricks bundle deploy --target prod
