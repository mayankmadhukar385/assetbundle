name: CD Workflow Param

on:
  release:
    types: [published]

  workflow_dispatch:
    inputs:
      bundle_folders:
        description: "Comma separated bundle folders to deploy (e.g., src,test)"
        required: false
        default: ""  # empty default, so release trigger won't deploy everything

run-name: Deploy release ${{ github.event.release.tag_name || 'manual' }} to stage and prod

jobs:
  cd-deploy-stage:
    name: Deploy to stage
    runs-on: ubuntu-latest
    environment: stage

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || github.ref }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Databricks CLI
        run: curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install setuptools wheel

      - name: Configure Databricks
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: databricks current-user me

      - name: Deploy selected bundles to stage
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          # Get comma-separated list from input, fallback to empty
          FOLDERS="${{ github.event.inputs.bundle_folders || '' }}"

          # Exit if no folders selected (safety for release triggers)
          if [ -z "$FOLDERS" ]; then
            echo "No folders selected for deployment. Exiting."
            exit 0
          fi

          # Split by comma and deploy each folder
          IFS=',' read -ra DIRS <<< "$FOLDERS"

          for DIR in "${DIRS[@]}"; do
            echo "Deploying bundle in $DIR to stage"
            databricks bundle validate --bundle "$DIR" --target stage
            databricks bundle deploy --bundle "$DIR" --target stage
          done

  cd-deploy-prod:
    name: Deploy to prod
    needs: cd-deploy-stage
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || github.ref }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Databricks CLI
        run: curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install setuptools wheel

      - name: Configure Databricks
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: databricks current-user me

      - name: Deploy selected bundles to prod
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          FOLDERS="${{ github.event.inputs.bundle_folders || '' }}"

          if [ -z "$FOLDERS" ]; then
            echo "No folders selected for deployment. Exiting."
            exit 0
          fi

          IFS=',' read -ra DIRS <<< "$FOLDERS"

          for DIR in "${DIRS[@]}"; do
            echo "Deploying bundle in $DIR to prod"
            databricks bundle validate --bundle "$DIR" --target prod
            databricks bundle deploy --bundle "$DIR" --target prod
          done
