name: CD Workflow (On Release Published)

on:
  release:
    types: [published]

run-name: Deploy release ${{ github.event.release.tag_name }} to stage and prod

jobs:
  cd-deploy-stage:
    name: Deploy to stage
    runs-on: ubuntu-latest
    environment: stage

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Databricks CLI
        run: curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install setuptools wheel

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init (stage)
        working-directory: terraform/envs/stage
        env:
          TF_VAR_databricks_host: ${{ secrets.DATABRICKS_HOST }}
          TF_VAR_databricks_token: ${{ secrets.DATABRICKS_TOKEN }}
          TF_VAR_catalog_name: assetbundles
          TF_VAR_schema_name: Stage
          TF_VAR_environment: stage
        run: terraform init

      - name: Terraform Validate (stage)
        working-directory: terraform/envs/stage
        env:
          TF_VAR_databricks_host: ${{ secrets.DATABRICKS_HOST }}
          TF_VAR_databricks_token: ${{ secrets.DATABRICKS_TOKEN }}
          TF_VAR_catalog_name: assetbundles
          TF_VAR_schema_name: Stage
          TF_VAR_environment: stage
        run: terraform validate

      - name: Terraform Plan (stage)
        working-directory: terraform/envs/stage
        env:
          TF_VAR_databricks_host: ${{ secrets.DATABRICKS_HOST }}
          TF_VAR_databricks_token: ${{ secrets.DATABRICKS_TOKEN }}
          TF_VAR_catalog_name: assetbundles
          TF_VAR_schema_name: Stage
          TF_VAR_environment: stage
        run: terraform plan -input=false

      - name: Terraform Apply (stage)
        working-directory: terraform/envs/stage
        env:
          TF_VAR_databricks_host: ${{ secrets.DATABRICKS_HOST }}
          TF_VAR_databricks_token: ${{ secrets.DATABRICKS_TOKEN }}
          TF_VAR_catalog_name: assetbundles
          TF_VAR_schema_name: Stage
          TF_VAR_environment: stage
        run: terraform apply -auto-approve -input=false

      - name: Configure Databricks (PAT)
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: databricks current-user me

      - name: Validate bundle
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: databricks bundle validate --target stage

      - name: Deploy bundle
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: databricks bundle deploy --target stage

  cd-deploy-prod:
    name: Deploy to prod
    needs: cd-deploy-stage
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Databricks CLI
        run: curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install setuptools wheel

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init (prod)
        working-directory: terraform/envs/prod
        env:
          TF_VAR_databricks_host: ${{ secrets.DATABRICKS_HOST }}
          TF_VAR_databricks_token: ${{ secrets.DATABRICKS_TOKEN }}
          TF_VAR_catalog_name: assetbundles
          TF_VAR_schema_name: prod
          TF_VAR_environment: prod
        run: terraform init

      - name: Terraform Validate (prod)
        working-directory: terraform/envs/prod
        env:
          TF_VAR_databricks_host: ${{ secrets.DATABRICKS_HOST }}
          TF_VAR_databricks_token: ${{ secrets.DATABRICKS_TOKEN }}
          TF_VAR_catalog_name: assetbundles
          TF_VAR_schema_name: prod
          TF_VAR_environment: prod
        run: terraform validate

      - name: Terraform Plan (prod)
        working-directory: terraform/envs/prod
        env:
          TF_VAR_databricks_host: ${{ secrets.DATABRICKS_HOST }}
          TF_VAR_databricks_token: ${{ secrets.DATABRICKS_TOKEN }}
          TF_VAR_catalog_name: assetbundles
          TF_VAR_schema_name: prod
          TF_VAR_environment: prod
        run: terraform plan -input=false

      - name: Terraform Apply (prod)
        working-directory: terraform/envs/prod
        env:
          TF_VAR_databricks_host: ${{ secrets.DATABRICKS_HOST }}
          TF_VAR_databricks_token: ${{ secrets.DATABRICKS_TOKEN }}
          TF_VAR_catalog_name: assetbundles
          TF_VAR_schema_name: prod
          TF_VAR_environment: prod
        run: terraform apply -auto-approve -input=false

      - name: Configure Databricks (PAT)
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: databricks current-user me

      - name: Validate bundle
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: databricks bundle validate --target prod

      - name: Deploy bundle
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: databricks bundle deploy --target prod
