name: CI Workflow

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
  push:
    branches:
      - main
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
  
jobs:
  ci_job:
    name: CI job
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip
          python -m pip --version

      - name: Install dependencies
        run: |
          pip install -r requirements-pyspark.txt
          pip install "pytest>=8.0.0" "pytest-html>=4.1.1"
          pip install "pylint>=3.2.0" "nbqa>=1.8.0"

      - name: Lint Python files with pylint
        run: |
          python -m pylint src

      - name: Lint notebooks with nbqa + pylint
        run: |
          nbqa pylint resources --nbqa-shell

      - name: Run pytest
        run: |
          pytest -q --disable-warnings --maxfail=1 \
            --html=pytest_report.html --self-contained-html

      - name: Upload pytest report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report
          path: pytest_report.html

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt 
        run: terraform fmt -recursive

      - name: Terraform Init (dev)
        working-directory: terraform/envs/dev
        env:
          TF_VAR_databricks_host: ${{ secrets.DATABRICKS_HOST }}
          TF_VAR_databricks_token: ${{ secrets.DATABRICKS_TOKEN }}
          TF_VAR_catalog_name: assetbundles
          TF_VAR_schema_name: mayank_dev
          TF_VAR_environment: dev
        run: terraform init

      - name: Terraform Validate (dev)
        working-directory: terraform/envs/dev
        env:
          TF_VAR_databricks_host: ${{ secrets.DATABRICKS_HOST }}
          TF_VAR_databricks_token: ${{ secrets.DATABRICKS_TOKEN }}
          TF_VAR_catalog_name: assetbundles
          TF_VAR_schema_name: mayank_dev
          TF_VAR_environment: dev
        run: terraform validate

      - name: Install Databricks CLI
        run: curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh
      
      - name: Validate bundle
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: databricks bundle validate --target stage

