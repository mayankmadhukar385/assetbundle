name: CI Workflow

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
  push:
    branches:
      - main

jobs:
  ci_job:
    name: CI job
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip
          python -m pip --version

      - name: Install dependencies
        run: |
          # Your existing runtime deps
          pip install -r requirements-pyspark.txt

          # Lint tooling (explicit install avoids pyproject metadata/build issues)
          pip install "pylint>=3.2.0" "nbqa>=1.8.0"

      # -------------------------
      # LINT PYTHON FILES (.py)
      # -------------------------
      - name: Lint Python files with pylint
        run: |
          # Adjust these paths to your repo structure
          python -m pylint src 

      # -------------------------
      # LINT NOTEBOOKS (.ipynb)
      # -------------------------
      - name: Lint notebooks with nbqa + pylint
        run: |
          # Change 'notebooks' if your notebooks live elsewhere
          nbqa pylint resources --nbqa-shell

      # -------------------------
      # VALIDATE + DEPLOY DAB
      # -------------------------
      - name: Install Databricks CLI
        uses: databricks/setup-cli@main

      - name: Validate Databricks Bundle (dev target)
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          databricks bundle validate -t dev

      - name: Deploy Databricks Bundle (dev target)
        if: github.ref == 'refs/heads/main'
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          databricks bundle deploy -t dev