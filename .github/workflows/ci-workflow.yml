name: CI Workflow

on:
  pull_request:
    branches:
      - main
    types:
      - opened   # triggers when PR is created
      # optional: include these if you want it to re-run when PR is updated
      - synchronize
      - reopened

jobs:
  ci_job:
    name: CI Job
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies + pytest-html
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-pyspark.txt