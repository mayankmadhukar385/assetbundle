name: CI Workflow

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
  push:
    branches:
      - main

jobs:
  ci_job:
    name: Lint + Validate Bundle
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install project + dev dependencies
        run: |
          pip install -r requirements-pyspark.txt
          pip install . --group dev

      # -------------------------
      # LINT PYTHON FILES (.py)
      # -------------------------
      - name: Lint Python files with pylint
        run: |
          # Update paths if needed
          python -m pylint src dabproject

      # -------------------------
      # LINT NOTEBOOKS (.ipynb)
      # -------------------------
      - name: Lint notebooks with nbqa + pylint
        run: |
          # Change 'notebooks' if your notebooks live elsewhere
          nbqa pylint notebooks --nbqa-shell

      # -------------------------
      # VALIDATE DATABRICKS BUNDLE
      # -------------------------
      - name: Install Databricks CLI
        uses: databricks/setup-cli@main

      - name: Validate Databricks Bundle (dev target)
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          databricks bundle validate -t dev

      # -------------------------
      # DEPLOY ONLY ON MAIN MERGE
      # -------------------------
      - name: Deploy Databricks Bundle (dev target)
        if: github.ref == 'refs/heads/main'
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          databricks bundle deploy -t dev